wandb_project: evidential-bnn-experiments
seed: 0

experiments:

  # ── CIFAR-10 Stage 1 ─────────────────────────────────────────────────────
  cifar10_resnet20:
    config: cifar10_resnet20
    overrides:
      - training.wandb.name=cifar10_resnet20_sgd

  cifar10_resnet20_no_aug:
    config: cifar10_resnet20_no_augmentation
    overrides:
      - training.wandb.name=cifar10_resnet20_sgd_no_aug

  edl_cifar10_digamma:
    config: edl_cifar10_resnet20
    overrides:
      - training.loss.name=edl_digamma
      - training.wandb.name=cifar10_digamma_sgd_edl

  edl_cifar10_log:
    config: edl_cifar10_resnet20
    overrides:
      - training.loss.name=edl_log
      - training.wandb.name=cifar10_log_sgd_edl

  edl_cifar10_mse:
    config: edl_cifar10_resnet20
    overrides:
      - training.loss.name=edl_mse
      - training.wandb.name=cifar10_mse_sgd_edl


  # ── Fashion-MNIST Stage 1 ─────────────────────────────────────────────────
  fashion_mnist_sgd:
    config: fashion_mnist_sgd
    overrides:
      - training.wandb.name=fashion_mnist_sgd
  fashion_mnist_edl:
    config: fashion_mnist_edl
    overrides:
      - training.wandb.name=fashion_mnist_sgd_edl

  # ── CIFAR-10 Stage 2: Categorical BNN ────────────────────────────────────

  cifar10_bnn_T_1:
    config: cifar10_resnet20_categorical_bnn_sgld
    pretrained_from: cifar10_resnet20
    overrides:
      - training.sampler.params.temperature=1.0
      - training.wandb.name=cifar10_bnn_sgld_T_1

  cifar10_bnn_T_1_3072_batch:
    config: cifar10_resnet20_categorical_bnn_sgld_3072_batch
    pretrained_from: cifar10_resnet20
    overrides:
      - training.sampler.params.temperature=1.0
      - training.wandb.name=cifar10_bnn_sgld_T_1_3072_batch

  cifar10_bnn_T_0.1:
    config: cifar10_resnet20_categorical_bnn_sgld
    pretrained_from: cifar10_resnet20
    overrides:
      - training.sampler.params.temperature=0.1
      - training.wandb.name=cifar10_bnn_sgld_T_0.1

  cifar10_bnn_T_0.01:
    config: cifar10_resnet20_categorical_bnn_sgld
    pretrained_from: cifar10_resnet20
    overrides:
      - training.sampler.params.temperature=0.01
      - training.wandb.name=cifar10_bnn_sgld_T_0.01

  cifar10_bnn_T_0.001:
    config: cifar10_resnet20_categorical_bnn_sgld
    pretrained_from: cifar10_resnet20
    overrides:
      - training.sampler.params.temperature=0.001
      - training.wandb.name=cifar10_bnn_sgld_T_0.001

  cifar10_bnn_T_0.0001:
    config: cifar10_resnet20_categorical_bnn_sgld
    pretrained_from: cifar10_resnet20
    overrides:
      - training.sampler.params.temperature=0.0001
      - training.wandb.name=cifar10_bnn_sgld_T_0.0001

  cifar10_bnn_lr_0.001:
    config: cifar10_resnet20_categorical_bnn_sgld
    pretrained_from: cifar10_resnet20
    overrides:
      - training.sampler.params.lr=0.001
      - training.wandb.name=cifar10_bnn_sgld_lr_0.001

  cifar10_bnn_lr_0.0001:
    config: cifar10_resnet20_categorical_bnn_sgld
    pretrained_from: cifar10_resnet20
    overrides:
      - training.sampler.params.lr=0.0001
      - training.wandb.name=cifar10_bnn_sgld_lr_0.0001

  cifar10_bnn_lr_0.00001:
    config: cifar10_resnet20_categorical_bnn_sgld
    pretrained_from: cifar10_resnet20
    overrides:
      - training.sampler.params.lr=0.00001
      - training.wandb.name=cifar10_bnn_sgld_lr_0.00001

  cifar10_bnn_lr_0.000001:
    config: cifar10_resnet20_categorical_bnn_sgld
    pretrained_from: cifar10_resnet20
    overrides:
      - training.sampler.params.lr=0.000001
      - training.wandb.name=cifar10_bnn_sgld_lr_0.000001

  cifar10_bnn_lr_0.0001_T_0.1:
    config: cifar10_resnet20_categorical_bnn_sgld
    pretrained_from: cifar10_resnet20
    overrides:
      - training.sampler.params.lr=0.0001
      - training.sampler.params.temperature=0.1
      - training.wandb.name=cifar10_bnn_sgld_lr_0.0001_T_0.1

  cifar10_bnn_lr_0.0001_T_0.01:
    config: cifar10_resnet20_categorical_bnn_sgld
    pretrained_from: cifar10_resnet20
    overrides:
      - training.sampler.params.lr=0.0001
      - training.sampler.params.temperature=0.01
      - training.wandb.name=cifar10_bnn_sgld_lr_0.0001_T_0.01

  cifar10_bnn_lr_0.0001_T_0.001:
    config: cifar10_resnet20_categorical_bnn_sgld
    pretrained_from: cifar10_resnet20
    overrides:
      - training.sampler.params.lr=0.0001
      - training.sampler.params.temperature=0.001
      - training.wandb.name=cifar10_bnn_sgld_lr_0.0001_T_0.001

  cifar10_bnn_lr_0.0001_T_0.00001:
    config: cifar10_resnet20_categorical_bnn_sgld
    pretrained_from: cifar10_resnet20
    overrides:
      - training.sampler.params.lr=0.0001
      - training.sampler.params.temperature=0.00001
      - training.wandb.name=cifar10_bnn_sgld_lr_0.0001_T_0.00001

  cifar10_bnn_lr_0.0001_T_0.0001:
    config: cifar10_resnet20_categorical_bnn_sgld
    pretrained_from: cifar10_resnet20
    overrides:
      - training.sampler.params.lr=0.0001
      - training.sampler.params.temperature=0.0001
      - training.wandb.name=cifar10_bnn_sgld_lr_0.0001_T_0.0001

  cifar10_bnn_T_1_no_aug:
    config: cifar10_resnet20_categorical_bnn_sgld_no_aug
    pretrained_from: cifar10_resnet20_no_aug
    overrides:
      - training.wandb.name=cifar10_bnn_sgld_T_1_no_aug

  cifar10_bnn_T_0.1_no_aug:
    config: cifar10_resnet20_categorical_bnn_sgld_no_aug
    pretrained_from: cifar10_resnet20_no_aug
    overrides:
      - training.sampler.params.temperature=0.1
      - training.wandb.name=cifar10_bnn_sgld_T_0.1_no_aug

  cifar10_bnn_T_0.01_no_aug:
    config: cifar10_resnet20_categorical_bnn_sgld_no_aug
    pretrained_from: cifar10_resnet20_no_aug
    overrides:
      - training.sampler.params.temperature=0.01
      - training.wandb.name=cifar10_bnn_sgld_T_0.01_no_aug

  cifar10_bnn_T_0.001_no_aug:
    config: cifar10_resnet20_categorical_bnn_sgld_no_aug
    pretrained_from: cifar10_resnet20_no_aug
    overrides:
      - training.sampler.params.temperature=0.001
      - training.wandb.name=cifar10_bnn_sgld_T_0.001_no_aug

  cifar10_bnn_T_0.0001_no_aug:
    config: cifar10_resnet20_categorical_bnn_sgld_no_aug
    pretrained_from: cifar10_resnet20_no_aug
    overrides:
      - training.sampler.params.temperature=0.0001
      - training.wandb.name=cifar10_bnn_sgld_T_0.0001_no_aug

  cifar10_bnn_lr_0.001_no_aug:
    config: cifar10_resnet20_categorical_bnn_sgld_no_aug
    pretrained_from: cifar10_resnet20_no_aug
    overrides:
      - training.sampler.params.lr=0.001
      - training.wandb.name=cifar10_bnn_sgld_lr_0.001_no_aug

  cifar10_bnn_lr_0.0001_no_aug:
    config: cifar10_resnet20_categorical_bnn_sgld_no_aug
    pretrained_from: cifar10_resnet20_no_aug
    overrides:
      - training.sampler.params.lr=0.0001
      - training.wandb.name=cifar10_bnn_sgld_lr_0.0001_no_aug

  cifar10_bnn_lr_0.00001_no_aug:
    config: cifar10_resnet20_categorical_bnn_sgld_no_aug
    pretrained_from: cifar10_resnet20_no_aug
    overrides:
      - training.sampler.params.lr=0.00001
      - training.wandb.name=cifar10_bnn_sgld_lr_0.00001_no_aug

  # ── CIFAR-10 Stage 2: Dirichlet BNN  ──────────────────────────────────────
  cifar10_dirichlet_bnn:
    config: cifar10_resnet20_dirichlet_bnn
    pretrained_from: edl_cifar10_log
    overrides:
      - training.wandb.name=cifar10_dirichlet_bnn_sgld

  cifar10_dirichlet_bnn_gamma_c1_r0.1:
    config: cifar10_resnet20_dirichlet_bnn
    pretrained_from: edl_cifar10_log
    overrides:
      - "training.prior_fs={name: gamma_strength, params: {concentration: 1.0, rate: 0.1}}"
      - training.wandb.name=cifar10_dirichlet_bnn_gamma_c1_r0.1

  # ── Dirichlet BNN: gamma prior sweep ─────────────────────────────────────
  # Mode ~10 (diffuse — high aleatoric assumption)
  cifar10_dirichlet_bnn_gamma_m10_c2_r0.1:
    config: cifar10_resnet20_dirichlet_bnn
    pretrained_from: edl_cifar10_log
    overrides:
      - "training.prior_fs={name: gamma_strength, params: {concentration: 2.0, rate: 0.1}}"
      - training.wandb.name=cifar10_dirichlet_bnn_gamma_m10_c2_r0.1

  cifar10_dirichlet_bnn_gamma_m10_c6_r0.5:
    config: cifar10_resnet20_dirichlet_bnn
    pretrained_from: edl_cifar10_log
    overrides:
      - "training.prior_fs={name: gamma_strength, params: {concentration: 6.0, rate: 0.5}}"
      - training.wandb.name=cifar10_dirichlet_bnn_gamma_m10_c6_r0.5

  cifar10_dirichlet_bnn_gamma_m10_c21_r2:
    config: cifar10_resnet20_dirichlet_bnn
    pretrained_from: edl_cifar10_log
    overrides:
      - "training.prior_fs={name: gamma_strength, params: {concentration: 21.0, rate: 2.0}}"
      - training.wandb.name=cifar10_dirichlet_bnn_gamma_m10_c21_r2

  cifar10_dirichlet_bnn_gamma_m10_c101_r10:
    config: cifar10_resnet20_dirichlet_bnn
    pretrained_from: edl_cifar10_log
    overrides:
      - "training.prior_fs={name: gamma_strength, params: {concentration: 101.0, rate: 10.0}}"
      - training.wandb.name=cifar10_dirichlet_bnn_gamma_m10_c101_r10

  # Mode ~96 (matched to pretrained strength)
  cifar10_dirichlet_bnn_gamma_m96_c11_r0.1:
    config: cifar10_resnet20_dirichlet_bnn
    pretrained_from: edl_cifar10_log
    overrides:
      - "training.prior_fs={name: gamma_strength, params: {concentration: 11.0, rate: 0.1}}"
      - training.wandb.name=cifar10_dirichlet_bnn_gamma_m96_c11_r0.1

  cifar10_dirichlet_bnn_gamma_m96_c49_r0.5:
    config: cifar10_resnet20_dirichlet_bnn
    pretrained_from: edl_cifar10_log
    overrides:
      - "training.prior_fs={name: gamma_strength, params: {concentration: 49.0, rate: 0.5}}"
      - training.wandb.name=cifar10_dirichlet_bnn_gamma_m96_c49_r0.5

  cifar10_dirichlet_bnn_gamma_m96_c193_r2:
    config: cifar10_resnet20_dirichlet_bnn
    pretrained_from: edl_cifar10_log
    overrides:
      - "training.prior_fs={name: gamma_strength, params: {concentration: 193.0, rate: 2.0}}"
      - training.wandb.name=cifar10_dirichlet_bnn_gamma_m96_c193_r2

  cifar10_dirichlet_bnn_gamma_m96_c961_r10:
    config: cifar10_resnet20_dirichlet_bnn
    pretrained_from: edl_cifar10_log
    overrides:
      - "training.prior_fs={name: gamma_strength, params: {concentration: 961.0, rate: 10.0}}"
      - training.wandb.name=cifar10_dirichlet_bnn_gamma_m96_c961_r10

  # Mode ~400 (overconfident — low aleatoric assumption)
  cifar10_dirichlet_bnn_gamma_m400_c41_r0.1:
    config: cifar10_resnet20_dirichlet_bnn
    pretrained_from: edl_cifar10_log
    overrides:
      - "training.prior_fs={name: gamma_strength, params: {concentration: 41.0, rate: 0.1}}"
      - training.wandb.name=cifar10_dirichlet_bnn_gamma_m400_c41_r0.1

  cifar10_dirichlet_bnn_gamma_m400_c201_r0.5:
    config: cifar10_resnet20_dirichlet_bnn
    pretrained_from: edl_cifar10_log
    overrides:
      - "training.prior_fs={name: gamma_strength, params: {concentration: 201.0, rate: 0.5}}"
      - training.wandb.name=cifar10_dirichlet_bnn_gamma_m400_c201_r0.5

  cifar10_dirichlet_bnn_gamma_m400_c801_r2:
    config: cifar10_resnet20_dirichlet_bnn
    pretrained_from: edl_cifar10_log
    overrides:
      - "training.prior_fs={name: gamma_strength, params: {concentration: 801.0, rate: 2.0}}"
      - training.wandb.name=cifar10_dirichlet_bnn_gamma_m400_c801_r2

  cifar10_dirichlet_bnn_gamma_m400_c4001_r10:
    config: cifar10_resnet20_dirichlet_bnn
    pretrained_from: edl_cifar10_log
    overrides:
      - "training.prior_fs={name: gamma_strength, params: {concentration: 4001.0, rate: 10.0}}"
      - training.wandb.name=cifar10_dirichlet_bnn_gamma_m400_c4001_r10

