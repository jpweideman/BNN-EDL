defaults:
  - dataset: cifar10
  - model: resnet20
  - training: standard
  - _self_

seed: 1

model:
  params:
    output_layer_config:
      type: dirichlet
      params:
        num_classes: 10

training:
  loss:
    name: edl_log
    params:
      num_classes: 10
      annealing_step: 300

  early_stopping:
    enabled: false
    dataset: test
    metric: accuracy
    patience: 10
    min_delta: 0.0
    objective: maximize

  checkpoint:
    enabled: true
    dataset: test
    metric: accuracy
    objective: maximize

  wandb:
    project: bnn-edl-experiments
    name: edl_cifar10_resnet20_log_loss
  
  num_epochs: 300

  optimizer:
    name: sgd
    lr: 1e-1
    momentum: 0.9
    weight_decay: 1e-4

  scheduler:
    enabled: true
    name: cosine_annealing
    T_max: 300
    eta_min: 0

  evaluation:
    val:
      interval: 0
      metrics:
        - name: accuracy
        - name: loss
        - name: vacuity
        - name: dirichlet_strength
        - name: dirichlet_nll
        - name: dirichlet_brier_score
        - name: dirichlet_predictive_entropy
        - name: dirichlet_expected_entropy
        - name: dirichlet_mutual_information
        - name: dirichlet_calibration_error
          params:
            num_classes: 10
            num_bins: 15
            norm: l1
    test:
      interval: 1
      metrics:
        - name: accuracy
        - name: loss
        - name: vacuity
        - name: dirichlet_strength
        - name: dirichlet_nll
        - name: dirichlet_brier_score
        - name: dirichlet_predictive_entropy
        - name: dirichlet_expected_entropy
        - name: dirichlet_mutual_information
        - name: dirichlet_calibration_error
          params:
            num_classes: 10
            num_bins: 15
            norm: l1

dataset:
  batch_size: 256
  num_workers: 4
  splits:
    train:
      fraction: 1.0
    val:
      fraction: 0.0
    test:
      fraction: 1.0

