defaults:
  - dataset: mnist
  - model: mlp
  - training: standard
  - _self_

seed: 1

model:
  params:
    output_layer_config:
      type: dirichlet
      params:
        num_classes: 10

training:
  device: cpu
  wandb:
    name: edl_mnist_mlp

  
  # Available EDL losses:
  #
  #
  # edl_digamma (equation 4, Sensoy et al. 2018, annealed KL):
  #   name: edl_digamma
  #   params:
  #     num_classes: 10
  #     annealing_step: 10
  #
  # edl_mse (equation 5, Sensoy et al. 2018, annealed KL):
  #   name: edl_mse
  #   params:
  #     num_classes: 10
  #     annealing_step: 10
  #
  # edl_log (equation 3, Sensoy et al. 2018, annealed KL):
  #   name: edl_log
  #   params:
  #     num_classes: 10
  #     annealing_step: 10
  loss:
    name: edl_mse
    params:
      num_classes: 10
      annealing_step: 10
  
  evaluation:
    train:
      interval: 0
    val:
      interval: 0
    test:
      interval: 1
      metrics:
        - name: accuracy
        - name: loss
        - name: vacuity
        - name: dirichlet_strength
        - name: dirichlet_nll
        - name: dirichlet_brier_score

# Override: add flatten transform for MLP
dataset:
  splits:
    train:
      fraction: 1.0
      transforms:
        - name: to_tensor
        - name: normalize
          params:
            mean: [0.1307]
            std: [0.3081]
        - name: flatten
    
    val:
      fraction: 0.0
      transforms:
        - name: to_tensor
        - name: normalize
          params:
            mean: [0.1307]
            std: [0.3081]
        - name: flatten
    
    test:
      fraction: 1.0
      transforms:
        - name: to_tensor
        - name: normalize
          params:
            mean: [0.1307]
            std: [0.3081]
        - name: flatten


