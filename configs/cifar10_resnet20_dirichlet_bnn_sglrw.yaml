defaults:
  - datasets: cifar10
  - model: resnet20
  - training: dirichlet_bnn_sglrw
  - evaluation: dirichlet_bnn_cifar10_test
  - _self_

seed: 1

model:
  params:
    output_layer_config:
      type: dirichlet
      params:
        num_classes: 10

training:
  dataset: cifar10_train
  checkpoint:
    dataset: cifar10_test
  device: auto
  num_epochs: 500
  pretrained:
    enabled: true
    path: /home/ra65puy/ra65puy_lrz_mount/BNN-EDL/outputs/2026-05-15/14-10-04/best_model.pt
  wandb:
    project: bnn-edl
    name: cifar10_resnet20_dirichlet_bnn_sglrw_pretrained
    summary_metrics:
      cifar10_test:
        - name: accuracy
          objective: maximize
        - name: dirichlet_nll
          objective: minimize
  sampler:
    name: sglrw
    params:
      lr: 0.01
      temperature: 1.0
  scheduler:
    enabled: false
  sampling:
    enabled: true
    start_epoch: 100
    sample_interval: 20
  early_stopping:
    enabled: false
    dataset: cifar10_test
    metric: accuracy
    patience: 20
    min_delta: 0.0
    objective: maximize
