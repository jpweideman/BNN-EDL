defaults:
  - datasets: cifar10
  - model: resnet20
  - training: dirichlet_bnn_sgld
  - evaluation: dirichlet_bnn_cifar10_test
  - _self_

seed: 1

model:
  params:
    output_layer_config:
      type: dirichlet
      params:
        num_classes: 10

training:
  dataset: cifar10_train
  checkpoint:
    dataset: cifar10_test
  device: auto
  num_epochs: 500
  pretrained:
    enabled: true
    path: /home/ra65puy/ra65puy_lrz_mount/BNN-EDL/outputs/2026-05-15/14-10-04/best_model.pt
  prior_fs:
    name: gamma_alpha0
    params:
      concentration: 2.0
      rate: 0.1
  wandb:
    project: bnn-edl
    name: cifar10_resnet20_dirichlet_bnn_sgld_gamma_priorfs_concentration_2.0_rate_0.1
    summary_metrics:
      cifar10_test:
        - name: accuracy
          objective: maximize
        - name: dirichlet_nll
          objective: minimize
  sampler:
    name: sgld
    params:
      lr: 0.01
      temperature: 1.0
  scheduler:
    enabled: false
  sampling:
    enabled: true
    start_epoch: 100
    sample_interval: 20
  early_stopping:
    enabled: false
    dataset: cifar10_test
    metric: accuracy
    patience: 20
    min_delta: 0.0
    objective: maximize
