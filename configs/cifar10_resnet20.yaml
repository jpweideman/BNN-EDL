defaults:
  - datasets: cifar10
  - model: resnet20
  - training: standard
  - evaluation: standard_cifar10
  - _self_

seed: 1

training:
  dataset: cifar10_train
  checkpoint:
    dataset: cifar10_test
  wandb:
    summary_metrics:
      cifar10_test:
        - name: accuracy
          objective: maximize
        - name: loss
          objective: minimize
  num_epochs: 400
  scheduler:
    params:
      T_max: 400
      eta_min: 0
