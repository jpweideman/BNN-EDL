defaults:
  - datasets: cifar10
  - model: resnet20
  - training: standard
  - _self_

seed: 1

training:
  dataset: cifar10_train
  checkpoint:
    dataset: cifar10_test
  early_stopping:
    enabled: false
    dataset: cifar10_test
    metric: accuracy
    patience: 10
    min_delta: 0.0
    objective: maximize
  wandb:
    project: bnn-edl
    name: cifar10_resnet20
    summary_metrics:
      cifar10_test:
        - name: accuracy
          objective: maximize
        - name: loss
          objective: minimize
  num_epochs: 300
  optimizer:
    name: sgd
    lr: 1e-1
    momentum: 0.9
    weight_decay: 1e-4
  scheduler:
    enabled: true
    name: cosine_annealing
    T_max: 300
    eta_min: 0
  evaluation:
    cifar10_test:
      interval: 1
      metrics:
        - name: accuracy
        - name: loss
        - name: nll
        - name: brier_score
        - name: calibration_error
          params:
            num_classes: 10
            num_bins: 15
            norm: l1
