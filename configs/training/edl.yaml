num_epochs: 50
device: auto

pretrained:
  enabled: false
  path: null

loss:
  name: edl_log
  params:
    num_classes: 10
    annealing_step: 40

optimizer:
  name: adam
  params:
    lr: 0.01
    momentum: 0.9
    weight_decay: 1e-4

scheduler:
  enabled: true
  name: cosine_annealing
  params:
    T_max: 50
    eta_min: 0

checkpoint:
  enabled: true
  metric: accuracy
  objective: maximize

early_stopping:
  enabled: false
  metric: loss
  patience: 10
  min_delta: 0.0
  objective: minimize

wandb:
  enabled: true
  project: bnn-edl
  name: null
  log_interval: 20
