num_epochs: 10
device: auto

pretrained:
  enabled: false
  path: null

loss:
  name: edl_digamma
  params:
    num_classes: 10
    annealing_step: 10

optimizer:
  name: adam
  lr: 0.001
  weight_decay: 0.0

scheduler:
  enabled: false
  name: cosine_annealing
  T_max: 10
  eta_min: 0

checkpoint:
  enabled: true
  metric: accuracy
  objective: maximize

early_stopping:
  enabled: false
  metric: loss
  patience: 10
  min_delta: 0.0
  objective: minimize

wandb:
  enabled: true
  project: bnn-edl
  name: null
  log_interval: 20

evaluation: {}
