num_epochs: 10
device: auto

pretrained:
  enabled: false
  path: null

loss:
  name: edl_digamma
  params:
    num_classes: 10
    annealing_step: 10

optimizer:
  name: adam
  lr: 0.001
  weight_decay: 0.0

scheduler:
  enabled: false
  name: cosine_annealing
  T_max: 10
  eta_min: 0

checkpoint:
  enabled: true
  dataset: test
  metric: accuracy
  objective: maximize

early_stopping:
  enabled: false
  dataset: test
  metric: accuracy
  patience: 10
  min_delta: 0.0
  objective: maximize

wandb:
  enabled: true
  project: bnn-edl
  name: null
  log_interval: 20
  summary_metrics:
    test:
      - name: accuracy
        objective: maximize
      - name: dirichlet_nll
        objective: minimize

evaluation:
  train:
    interval: 0
    metrics:
      - name: loss
  val:
    interval: 0
    metrics:
      - name: accuracy
      - name: loss
  test:
    interval: 1
    metrics:
      - name: accuracy
      - name: loss
      - name: vacuity
      - name: dirichlet_strength
      - name: dirichlet_nll
      - name: dirichlet_brier_score
      - name: dirichlet_calibration_error
        params:
          num_classes: 10
          num_bins: 15
          norm: l1
      - name: dirichlet_predictive_entropy
      - name: dirichlet_expected_entropy
      - name: dirichlet_mutual_information
      - name: dirichlet_predictive_variance
