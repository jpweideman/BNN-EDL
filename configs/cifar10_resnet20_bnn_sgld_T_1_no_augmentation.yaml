defaults:
  - datasets: cifar10
  - model: resnet20
  - training: bnn_sgld
  - _self_

seed: 1

datasets:
  cifar10_train:
    name: cifar10
    source: train
    shuffle: true
    batch_size: 256
    num_workers: 4
    transforms:
      - name: to_tensor
      - name: normalize
        params:
          mean: [0.4914, 0.4822, 0.4465]
          std: [0.2470, 0.2434, 0.2615]

model:
  params:
    output_layer_config:
      type: linear
      params:
        num_classes: 10

training:
  dataset: cifar10_train
  checkpoint:
    dataset: cifar10_test
  device: auto
  num_epochs: 500
  pretrained:
    enabled: true
    path: /home/ra65puy/ra65puy_lrz_mount/BNN-EDL/outputs/2026-05-23/18-43-41/best_model.pt
  wandb:
    project: bnn-edl
    name: cifar10_resnet20_bnn_sgld_pretrained_temperature_1_no_augmentation
    summary_metrics:
      cifar10_test:
        - name: accuracy
          objective: maximize
        - name: loss
          objective: minimize
  likelihood:
    name: categorical
  prior:
    name: diagonal_normal
    params:
      sd: 1.0
      normalize: false
  sampler:
    name: sgld
    params:
      lr: 0.01
      temperature: 1
  scheduler:
    enabled: false
  sampling:
    enabled: true
    start_epoch: 100
    sample_interval: 20
  early_stopping:
    enabled: false
    dataset: cifar10_test
    metric: accuracy
    patience: 20
    min_delta: 0.0
    objective: maximize
  evaluation:
    cifar10_test:
      interval: 1
      metrics:
        - name: accuracy
        - name: loss
        - name: bma_accuracy
        - name: bma_nll
        - name: nll
        - name: brier_score
        - name: calibration_error
          params:
            num_classes: 10
            num_bins: 15
            norm: l1
        - name: bma_calibration_error
          params:
            num_classes: 10
            num_bins: 15
            norm: l1
        - name: bma_predictive_entropy
        - name: bma_expected_entropy
        - name: bma_mutual_information
        - name: bma_predictive_variance
