defaults:
  - datasets: fashion_mnist
  - model: resnet20
  - training: dirichlet_bnn_sgld
  - _self_

seed: 1

model:
  params:
    in_channels: 1
    output_layer_config:
      type: dirichlet
      params:
        num_classes: 10

training:
  dataset: fashion_mnist_train
  checkpoint:
    dataset: fashion_mnist_test
  pretrained:
    enabled: false
    path: /home/ra65puy/ra65puy_lrz_mount/BNN-EDL/outputs/2026-04-26/18-37-21/best_model.pt
  wandb:
    name: fashion_mnist_dirichlet_bnn_sgld_pretrained_edl
    summary_metrics:
      fashion_mnist_test:
        - name: accuracy
          objective: maximize
        - name: dirichlet_nll
          objective: minimize
  prior_fs:
    name: gamma_alpha0
    params:
      concentration: 2.0
      rate: 0.1     
  sampler:
    params:
      lr: 1e-1
  num_epochs: 30
  evaluation:
    fashion_mnist_test:
      interval: 1
      metrics:
        - name: accuracy
        - name: loss
        - name: bma_dirichlet_accuracy
        - name: vacuity
        - name: dirichlet_strength
        - name: dirichlet_nll
        - name: bma_dirichlet_nll
        - name: dirichlet_brier_score
        - name: dirichlet_calibration_error
          params:
            num_classes: 10
            num_bins: 15
            norm: l1
        - name: bma_dirichlet_brier_score
        - name: bma_dirichlet_calibration_error
          params:
            num_classes: 10
            num_bins: 15
            norm: l1
        - name: dirichlet_predictive_entropy
        - name: dirichlet_expected_entropy
        - name: dirichlet_mutual_information
        - name: dirichlet_predictive_variance
    mnist_ood:
      interval: 1
      metrics:
        - name: vacuity
        - name: dirichlet_strength
        - name: dirichlet_mutual_information
        - name: dirichlet_predictive_entropy
    random_noise_ood:
      interval: 1
      metrics:
        - name: vacuity
        - name: dirichlet_strength
        - name: dirichlet_mutual_information
        - name: dirichlet_predictive_entropy
