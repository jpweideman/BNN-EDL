defaults:
  - datasets: cifar10
  - model: resnet20
  - training: dirichlet_bnn_sgld
  - _self_

seed: 1

model:
  params:
    output_layer_config:
      type: dirichlet
      params:
        num_classes: 10

training:
  dataset: cifar10_train
  checkpoint:
    dataset: cifar10_test
  device: auto
  num_epochs: 500
  pretrained:
    enabled: true
    path: /home/ra65puy/ra65puy_lrz_mount/BNN-EDL/outputs/2026-03-14/13-26-34/best_model.pt
  wandb:
    project: bnn-edl
    name: cifar10_resnet20_dirichlet_bnn_sgld_pretained_with_edl_digamma
    summary_metrics:
      cifar10_test:
        - name: accuracy
          objective: maximize
        - name: dirichlet_nll
          objective: minimize
  optimizer:
    name: sgld
    params:
      lr: 0.01
      temperature: 1.0
  scheduler:
    enabled: false
  sampling:
    enabled: true
    start_epoch: 200
    sample_interval: 4
  early_stopping:
    enabled: false
    dataset: cifar10_test
    metric: accuracy
    patience: 20
    min_delta: 0.0
    objective: maximize
  evaluation:
    cifar10_test:
      interval: 1
      metrics:
        - name: accuracy
        - name: loss
        - name: bma_dirichlet_accuracy
        - name: vacuity
        - name: dirichlet_strength
        - name: dirichlet_nll
        - name: bma_dirichlet_nll
        - name: dirichlet_brier_score
        - name: bma_dirichlet_brier_score
        - name: bma_dirichlet_calibration_error
          params:
            num_classes: 10
            num_bins: 15
            norm: l1
        - name: dirichlet_predictive_entropy
        - name: dirichlet_expected_entropy
        - name: dirichlet_mutual_information
        - name: dirichlet_predictive_variance
        - name: dirichlet_calibration_error
          params:
            num_classes: 10
            num_bins: 15
            norm: l1
